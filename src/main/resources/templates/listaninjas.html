<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Seleção de Lutadores</title>

    <style>

        body {
            font-family: 'Trebuchet MS', sans-serif;
            margin: 0;
            padding: 40px;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 70%);
            color: white;
        }

        h1 {
            text-align: center;
            font-size: 48px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ff3c00;
            text-shadow:
                    0 0 10px red,
                    0 0 20px red,
                    0 0 40px #ff3c00;
            margin-bottom: 60px;
        }

        /* GRID estilo tela de seleção */
        .arena {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 35px;
        }

        /* Card do lutador */
        .card {
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid #ff3c00;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
            transition: 0.3s ease;
        }

        /* Efeito personagem selecionado */
        .card:hover {
            transform: scale(1.06);
            box-shadow: 0 0 40px red;
            border-color: #ff0000;
        }

        /* Imagem do lutador */
        .card img {
            width: 170px;
            height: 230px;
            object-fit: contain;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .card:hover img {
            transform: scale(1.08);
        }

        /* Nome */
        .card h2 {
            margin: 10px 0;
            font-size: 22px;
            color: #ff3c00;
            text-shadow: 0 0 10px red;
            text-transform: uppercase;
        }

        /* Informações */
        .card p {
            font-size: 14px;
            color: #ddd;
            margin: 4px 0;
        }

        .rank {
            font-weight: bold;
            color: #ff3c00;
        }

        .acao a, .acoes a, .btn-detalhes, .btn-alterar, .btn-deletar {
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-detalhes {
            background-color: #00aaff;
        }

        .btn-detalhes:hover {
            background-color: #0088cc;
        }

        .btn-alterar {
            background-color: #ffaa00;
        }

        .btn-alterar:hover {
            background-color: #cc8800;
        }

        .btn-deletar {
            background-color: #ff3333;
        }

        .btn-deletar:hover {
            background-color: #cc0000;
        }

    </style>
</head>
<body>

<h1>🔥 Seleção de Lutadores 🔥</h1>

<div style="text-align: center; margin-bottom: 30px;">
    <a th:href="@{/ninjas/adicionar}"
       style="background-color:#00ff66; color:#000; padding:10px 20px; border-radius:8px; text-decoration:none; font-weight:bold;">
        ➕ Adicionar Ninja
    </a>
</div>

<div class="arena">

    <div class="card" th:each="ninja : ${ninjas}">

        <img th:src="${ninja.imgUrl}" alt="Lutador">

        <h2 th:text="${ninja.nome}"></h2>

        <p><strong>Email:</strong> <span th:text="${ninja.email}"></span></p>
        <p><strong>Idade:</strong> <span th:text="${ninja.idade}"></span></p>
        <p><strong>Rank:</strong> <span class="rank" th:text="${ninja.rank}"></span></p>

        <p>
            <strong>Missão:</strong>
            <span th:text="${ninja.missao != null ? ninja.missao.nome : 'Sem missão'}"></span>
        </p>

        <p>
            <strong>Dificuldade:</strong>
            <span th:text="${ninja.missao != null ? ninja.missao.dificuldade : '-'}"></span>
        </p>

        <div class="acoes" style="margin-top: 15px; display: flex; justify-content: center; gap: 10px;">
            <a th:href="@{'/ninjas/detalhes/' + ${ninja.id}}" class="btn-detalhes">Detalhes</a>
            <a th:href="@{'/ninjas/alterar/' + ${ninja.id}}" class="btn-alterar">Alterar</a>
            <a th:href="@{'/ninjas/deletar/' + ${ninja.id}}" class="btn-deletar"
               onclick="return confirm('Tem certeza que deseja deletar este ninja?');">Deletar</a>
        </div>

    </div>

</div>

</body>
</html>
